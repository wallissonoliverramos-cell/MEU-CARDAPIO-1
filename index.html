<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuscuz & Tapioca Delivery</title>

<style>
:root { --primary:#ea1d2c; --bg:#f7f7f7; --green:#25d366; }
*{ box-sizing:border-box; font-family:'Segoe UI',sans-serif; margin:0; padding:0; }

body{ background:var(--bg); padding-bottom:100px; }

header{
background:var(--primary);
color:white;
padding:20px;
text-align:center;
border-radius:0 0 20px 20px;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.item-card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
cursor:pointer;
}

.price{ color:#2e7d32; font-weight:bold; }

#modal-opcionais{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:1000;
align-items:flex-end;
justify-content:center;
}

.modal-content{
background:white;
width:100%;
max-width:500px;
border-radius:25px 25px 0 0;
padding:25px;
max-height:90vh;
overflow-y:auto;
}

.opcao-item{
display:flex;
justify-content:space-between;
padding:10px 5px;
border-bottom:1px solid #f0f0f0;
}

.footer{
position:fixed;
bottom:0;
background:white;
width:100%;
padding:15px;
border-top:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.btn-modal{
flex:1;
padding:16px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
color:white;
text-align:center;
text-decoration:none;
}

#checkout{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:999;
padding:20px;
overflow-y:auto;
}

.input-estilizado{
width:100%;
padding:14px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}
</style>
</head>

<body>

<div id="tela-principal">

<header>
<h1>Cuscuz & Tapioca Delivery ☕</h1>
</header>

<div class="container">
<div id="lista-produtos"></div>
</div>

<div class="footer">
<div>Total: <strong id="total-txt">R$ 0,00</strong></div>
<button class="btn-modal" style="background:var(--primary); padding:10px 20px;" onclick="abrirCheckout()">Ver Carrinho ➡</button>
</div>

</div>

<div id="modal-opcionais">
<div class="modal-content">

<h3 id="modal-titulo">Personalizar</h3>

<div id="secao-extras" style="margin:20px 0;"></div>

<textarea id="obs-item" class="input-estilizado" placeholder="Alguma observação?"></textarea>

<div style="display:flex; gap:10px;">
<button class="btn-modal" style="background:var(--primary);" onclick="fecharModal()">Voltar</button>
<button class="btn-modal" style="background:var(--green);" onclick="confirmarAdicao()">Adicionar</button>
</div>

</div>
</div>

<div id="checkout">

<button class="btn-modal" style="background:var(--primary); width:100%; margin-bottom:20px;" onclick="fecharCheckout()">⬅ Adicionar mais itens</button>

<h2>Resumo do Pedido</h2>

<div id="resumo" style="background:#f9f9f9; padding:15px; border-radius:12px; margin:15px 0;"></div>

<input type="text" id="nome-cliente" class="input-estilizado" placeholder="Seu Nome">

<input type="text" id="end-cliente" class="input-estilizado" placeholder="Endereço Completo">

<select id="pag-cliente" class="input-estilizado" onchange="document.getElementById('area-troco').style.display=(this.value=='Dinheiro'?'block':'none')">
<option value="PIX">PIX</option>
<option value="Cartão">Cartão</option>
<option value="Dinheiro">Dinheiro</option>
</select>

<div id="area-troco" style="display:none;">
<input type="number" id="valor-troco" class="input-estilizado" placeholder="Troco para quanto?">
</div>

<a id="link-whatsapp"
href="#"
class="btn-modal"
style="background:var(--green); display:block; width:100%; font-size:18px;"
onclick="enviarWhatsApp(event)">
🚀 Finalizar no WhatsApp
</a>

</div>

<script>

const produtos=[
{id:1,nome:"Cuscuz Carne Seca",preco:18.0},
{id:2,nome:"Cuscuz de Frango",preco:15.0},
{id:3,nome:"Tapioca de Queijo",preco:12.0},
{id:4,nome:"Tapioca Cartola",preco:14.0}
];

const categorias={

vinagrete:[
{nome:"Com Vinagrete",preco:0},
{nome:"Sem Vinagrete",preco:0}
],

bebidas:[
{nome:"Coca-Cola Lata",preco:6},
{nome:"Guaraná Lata",preco:5}
],

complementos:[
{nome:"Ovo Frito",preco:3},
{nome:"Queijo Coalho",preco:4.5}
]

};

let carrinho=[];
let itemAtual=null;

function renderizar(){
document.getElementById('lista-produtos').innerHTML=
produtos.map(p=>`
<div class="item-card" onclick="abrirModal(${p.id})">
<div>
<strong>${p.nome}</strong><br>
<span class="price">R$ ${p.preco.toFixed(2)}</span>
</div>
<button style="background:var(--primary); color:white; border:none; width:30px; height:30px; border-radius:50%;">+</button>
</div>
`).join('');
}

function criarCategoria(titulo,lista){

return `
<h4 style="margin:10px 0;">${titulo}</h4>

${lista.map(e=>`

<div class="opcao-item">

<label>
<input type="checkbox" class="chk-extra" data-nome="${e.nome}" data-preco="${e.preco}">
${e.nome}
</label>

<span>${e.preco>0?"+R$ "+e.preco.toFixed(2):"Grátis"}</span>

</div>

`).join('')}
`;

}

function abrirModal(id){

itemAtual=produtos.find(p=>p.id===id);

document.getElementById('modal-titulo').innerText=itemAtual.nome;

let html="";

if(itemAtual.nome.toLowerCase().includes("cuscuz")){
html+=criarCategoria("🥗 Vinagrete",categorias.vinagrete);
}

html+=criarCategoria("🥤 Bebidas",categorias.bebidas);

html+=criarCategoria("➕ Complementos",categorias.complementos);

document.getElementById('secao-extras').innerHTML=html;

document.getElementById('modal-opcionais').style.display='flex';

}

function fecharModal(){
document.getElementById('modal-opcionais').style.display='none';
}

function confirmarAdicao(){

let vE=0;
let nE=[];

document.querySelectorAll('.chk-extra:checked').forEach(c=>{
vE+=parseFloat(c.dataset.preco);
nE.push(c.dataset.nome);
});

carrinho.push({
nome:itemAtual.nome,
total:itemAtual.preco+vE,
detalhes:nE.join(', '),
obs:document.getElementById('obs-item').value
});

document.getElementById('obs-item').value="";

fecharModal();
atualizarTotal();
}

function atualizarTotal(){
const t=carrinho.reduce((s,i)=>s+i.total,0);
document.getElementById('total-txt').innerText=`R$ ${t.toFixed(2)}`;
}

function abrirCheckout(){

if(carrinho.length===0) return alert("Carrinho vazio!");

document.getElementById('resumo').innerHTML=
carrinho.map(i=>`
<div style="margin-bottom:10px;">
<strong>${i.nome}</strong><br>
${i.detalhes ? "Extras: "+i.detalhes+"<br>" : ""}
${i.obs ? "Obs: "+i.obs+"<br>" : ""}
Valor: R$ ${i.total.toFixed(2)}
</div>
`).join('');

document.getElementById('checkout').style.display='block';
}

function fecharCheckout(){
document.getElementById('checkout').style.display='none';
}

function enviarWhatsApp(event){

const n=document.getElementById('nome-cliente').value;
const e=document.getElementById('end-cliente').value;
const p=document.getElementById('pag-cliente').value;
const t=document.getElementById('valor-troco').value;

const total=carrinho.reduce((sum,i)=>sum+i.total,0);

if(!n || !e){
alert("Preencha Nome e Endereço!");
event.preventDefault();
return;
}

let msg=`*NOVO PEDIDO* 🛒\n\n👤 *Cliente:* ${n}\n📍 *Endereço:* ${e}\n--------------------------\n`;

carrinho.forEach(i=>{
msg+=`✅ *${i.nome}*\n${i.detalhes ? '  +' + i.detalhes + '\n' : ''}${i.obs ? '  _Obs: ' + i.obs + '_\n' : ''}  Valor: R$ ${i.total.toFixed(2)}\n\n`;
});

msg+=`--------------------------\n💰 *TOTAL: R$ ${total.toFixed(2)}*\n💳 *Pagamento:* ${p}`;

const fone="556192015467";

document.getElementById('link-whatsapp').href=
"https://api.whatsapp.com/send?phone="+fone+"&text="+encodeURIComponent(msg);

}

renderizar();

</script>

</body>
</html>
