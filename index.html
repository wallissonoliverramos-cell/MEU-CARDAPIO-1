<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuscuz & Tapioca Delivery</title>
    <style>
        :root { --primary: #ea1d2c; --bg: #f7f7f7; --green: #25d366; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding-bottom: 100px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        h2 { margin: 20px 0 10px; font-size: 18px; color: #444; border-left: 4px solid var(--primary); padding-left: 10px; }
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .price { color: #2e7d32; font-weight: bold; }
        #modal-opcionais { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: flex-end; justify-content: center; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 25px 25px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .modal-secao { margin-bottom: 15px; }
        .modal-secao h4 { background: #fdf2f2; padding: 8px; color: var(--primary); font-size: 13px; border-radius: 8px; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .opcao-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .obs-box { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; margin-top: 10px; font-size: 14px; min-height: 60px; }
        .footer { position: fixed; bottom: 0; background: white; width: 100%; padding: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 100; }
        .area-botoes-modal { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; color: white; }
        .btn-voltar-modal { background: var(--primary); }
        .btn-confirmar-modal { background: var(--green); }
        #checkout { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; padding: 20px; overflow-y: auto; }
        .btn-vermelho-full { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-bottom: 20px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div id="tela-principal">
    <header><h1>Cuscuz & Tapioca Delivery ☕</h1></header>
    <div class="container">
        <h2>🌽 Cuscuz</h2>
        <div id="lista-cuscuz"></div>
        <h2>⚪ Tapiocas</h2>
        <div id="lista-tapioca"></div>
    </div>
    <div class="footer">
        <div>Total: <strong id="total-txt">R$ 0,00</strong></div>
        <button style="background:var(--primary); color:white; border:none; padding:12px 20px; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="abrirCheckout()">Ver Carrinho ➡</button>
    </div>
</div>

<div id="modal-opcionais">
    <div class="modal-content">
        <h3 id="modal-titulo">Personalizar</h3>
        <div class="modal-secao" id="area-vinagrete">
            <h4>🍅 Vinagrete (Grátis)</h4>
            <div id="secao-vinagrete"></div>
        </div>
        <div class="modal-secao">
            <h4>🧀 Complementos</h4>
            <div id="secao-complementos"></div>
        </div>
        <div class="modal-secao">
            <h4>🥤 Bebidas</h4>
            <div id="secao-bebidas"></div>
        </div>
        <div class="modal-secao">
            <h4>📝 Observação</h4>
            <textarea id="obs-item" class="obs-box" placeholder="Ex: tirar a cebola, ponto do ovo..."></textarea>
        </div>
        <div class="area-botoes-modal">
            <button class="btn-modal btn-voltar-modal" onclick="fecharModal()">⬅ Voltar</button>
            <button class="btn-modal btn-confirmar-modal" onclick="confirmarAdicao()">✅ Adicionar</button>
        </div>
    </div>
</div>

<div id="checkout">
    <button class="btn-vermelho-full" onclick="fecharCheckout()">⬅ Adicionar mais itens</button>
    <h2>Resumo do Pedido</h2>
    <div id="resumo" style="background:#f9f9f9; padding:15px; border-radius:12px; margin: 15px 0; border: 1px solid #eee;"></div>
    <input type="text" id="nome" placeholder="Seu Nome" style="width:100%; padding:14px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
    <input type="text" id="endereco" placeholder="Endereço de Entrega" style="width:100%; padding:14px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
    <select id="pagamento" style="width:100%; padding:14px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
        <option value="Dinheiro">Dinheiro</option>
        <option value="PIX">PIX</option>
        <option value="Cartão">Cartão (Maquininha)</option>
    </select>
    <button class="btn-modal btn-confirmar-modal" style="width: 100%; font-size: 18px;" onclick="enviarWhatsApp()">🚀 Finalizar no WhatsApp</button>
</div>

<script>
    const produtos = [
        { id: 1, cat: 'cuscuz', nome: "Cuscuz Carne Seca", preco: 18.0 },
        { id: 2, cat: 'cuscuz', nome: "Cuscuz de Frango", preco: 15.0 },
        { id: 3, cat: 'tapioca', nome: "Tapioca de Queijo", preco: 12.0 },
        { id: 4, cat: 'tapioca', nome: "Tapioca Cartola", preco: 14.0 }
    ];

    const vinagreteOpc = [{ nome: "Vinagrete", preco: 0.0 }];
    const complementosOpc = [{ nome: "Ovo Frito", preco: 3.0 }, { nome: "Queijo Coalho", preco: 4.5 }];
    const bebidasOpc = [{ nome: "Café 300ml", preco: 5.0 }, { nome: "Suco Natural", preco: 8.0 }];

    let carrinho = [];
    let itemAtual = null;

    function renderizar() {
        ['cuscuz', 'tapioca'].forEach(cat => {
            document.getElementById('lista-' + cat).innerHTML = produtos.filter(p => p.cat === cat).map(p => `
                <div class="item-card" onclick="abrirModal(${p.id})">
                    <div><strong>${p.nome}</strong><br><span class="price">R$ ${p.preco.toFixed(2).replace('.',',')}</span></div>
                    <button style="background:var(--primary); color:white; border:none; width:35px; height:35px; border-radius:50%; cursor:pointer; font-size: 20px;">+</button>
                </div>
            `).join('');
        });
        atualizarTotal();
    }

    function abrirModal(id) {
        itemAtual = produtos.find(p => p.id === id);
        document.getElementById('modal-titulo').innerText = itemAtual.nome;
        document.getElementById('obs-item').value = ""; 
        const areaVinagrete = document.getElementById('area-vinagrete');
        areaVinagrete.style.display = itemAtual.cat === 'cuscuz' ? 'block' : 'none';
        const gerarHtml = (lista) => lista.map(opt => `<div class="opcao-item"><label style="display:flex; align-items:center; gap:10px; cursor:pointer;"><input type="checkbox" data-preco="${opt.preco}" data-nome="${opt.nome}" class="chk-extra"> ${opt.nome}</label><span>${opt.preco === 0 ? 'Grátis' : '+ R$ ' + opt.preco.toFixed(2).replace('.',',')}</span></div>`).join('');
        document.getElementById('secao-vinagrete').innerHTML = gerarHtml(vinagreteOpc);
        document.getElementById('secao-complementos').innerHTML = gerarHtml(complementosOpc);
        document.getElementById('secao-bebidas').innerHTML = gerarHtml(bebidasOpc);
        document.getElementById('modal-opcionais').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-opcionais').style.display = 'none'; }

    function confirmarAdicao() {
        let escolhidos = [];
        let totalExtras = 0;
        document.querySelectorAll('.chk-extra:checked').forEach(c => {
            escolhidos.push(c.getAttribute('data-nome'));
            totalExtras += parseFloat(c.getAttribute('data-preco'));
        });
        carrinho.push({ nome: itemAtual.nome, extras: escolhidos, obs: document.getElementById('obs-item').value, total: itemAtual.preco + totalExtras });
        atualizarTotal();
        fecharModal();
    }

    function atualizarTotal() {
        let total = carrinho.reduce((s, i) => s + i.total, 0);
        document.getElementById('total-txt').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    function abrirCheckout() {
        if(carrinho.length === 0) return alert("Carrinho vazio!");
        document.getElementById('tela-principal').style.display = 'none';
        document.getElementById('checkout').style.display = 'block';
        document.getElementById('resumo').innerHTML = carrinho.map((i, idx) => `<div style="border-bottom:1px solid #eee; padding:10px 0;"><strong>${i.nome}</strong> <span onclick="remover(${idx})" style="color:red; float:right; cursor:pointer; font-weight:bold;">[Remover]</span><br><small style="color:#666">Extras: ${i.extras.join(', ') || 'Nenhum'}</small>${i.obs ? '<br><small style="color:#ea1d2c">Obs: ' + i.obs + '</small>' : ''}<br><strong>R$ ${i.total.toFixed(2).replace('.',',')}</strong></div>`).join('') + `<div style="margin-top:15px; text-align:right;"><strong>Total: ${document.getElementById('total-txt').innerText}</strong></div>`;
    }

    function remover(idx) {
        carrinho.splice(idx, 1);
        abrirCheckout();
        atualizarTotal();
        if(carrinho.length === 0) fecharCheckout();
    }

    function fecharCheckout() {
        document.getElementById('tela-principal').style.display = 'block';
        document.getElementById('checkout').style.display = 'none';
    }

    function enviarWhatsApp() {
        const nome = document.getElementById('nome').value;
        const end = document.getElementById('endereco').value;
        const pag = document.getElementById('pagamento').value;
        const zap = "5561992015467"; // Seu número configurado

        if(!nome || !end) return alert("Preencha nome e endereço!");

        let pedidoTexto = carrinho.map(i => {
            let extras = i.extras.length > 0 ? `\n_Extras: ${i.extras.join(', ')}_` : "";
            let obs = i.obs ? `\n_Obs: ${i.obs}_` : "";
            return `✅ *${i.nome}*${extras}${obs}\nSubtotal: R$ ${i.total.toFixed(2).replace('.',',')}`;
        }).join('\n\n');

        let totalFinal = document.getElementById('total-txt').innerText;
        let mensagemFinal = `*NOVO PEDIDO*\n\n👤 *Cliente:* ${nome}\n📍 *End:* ${end}\n💳 *Pag:* ${pag}\n\n*ITENS:*\n${pedidoTexto}\n\n💰 *TOTAL: ${totalFinal}*`;

        // DETECTA SE É CELULAR OU PC E ABRE O LINK CORRETO
        const isMobile = /iPhone|Android/i.test(navigator.userAgent);
        const baseUrl = isMobile ? "https://api.whatsapp.com" : "https://web.whatsapp.com";
        const finalUrl = `${baseUrl}?phone=${zap}&text=${encodeURIComponent(mensagemFinal)}`;

        window.open(finalUrl, '_blank');
    }

    renderizar();
</script>
</body>
</html>
